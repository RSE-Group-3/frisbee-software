# nav2_params.yaml
use_sim_time: true

# Frame names
global_frame: odom
robot_base_frame: base_link
odom_topic: /odom

# Nav2 lifecycle
autostart: true

# Controller server: sends velocity commands
controller_server:
  ros__parameters:
    use_sim_time: true
    cmd_vel_topic: /cmd_vel  # must match diff_drive_controller
    min_vel_x: -0.5
    max_vel_x: 1.0
    min_vel_y: 0.0
    max_vel_y: 0.0
    min_vel_theta: -1.0
    max_vel_theta: 2.0
    acc_lim_x: 1.0
    acc_lim_theta: 2.0

# Planner server (global planner)
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5

# Local costmap
local_costmap:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: base_link
    update_frequency: 10.0
    publish_frequency: 5.0
    static_map: false
    rolling_window: true
    width: 6.0
    height: 6.0
    resolution: 0.05
    plugins: ["obstacle_layer", "inflation_layer"]
    obstacle_layer:
      plugin: "nav2_costmap_2d/ObstacleLayer"
      observation_sources: ["laser"]
      laser:
        topic: /scan
        data_type: LaserScan
        marking: true
        clearing: true
    inflation_layer:
      plugin: "nav2_costmap_2d/InflationLayer"

# Global costmap
global_costmap:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: base_link
    update_frequency: 5.0
    publish_frequency: 2.0
    static_map: true
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    static_layer:
      plugin: "nav2_costmap_2d/StaticLayer"
    obstacle_layer:
      plugin: "nav2_costmap_2d/ObstacleLayer"
      observation_sources: ["laser"]
      laser:
        topic: /scan
        data_type: LaserScan
        marking: true
        clearing: true
    inflation_layer:
      plugin: "nav2_costmap_2d/InflationLayer"

# Behavior tree navigator
bt_navigator:
  ros__parameters:
    use_sim_time: true
    default_bt_xml_filename: "navigate_w_replanning.xml"